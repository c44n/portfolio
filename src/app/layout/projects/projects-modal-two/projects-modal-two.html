<article>
    <header>
        <button class="btn_close_modal" (click)="closeModal()">
            <img class="btn_close_modal_img" src="../../../../assets/images/close_small.svg" alt="Close Modal">
        </button>
    </header>

    <main>
        <div class="inner">
            <div class="left">
                <div class="title-wrapper">
                    <h4>02</h4>
                    <h3>El Pollo Loco</h3>
                </div>

                <div class="modal_project_about">What is this project about?</div>

                <p>
                    Jump, run and throw game based on object-oriented approach. Help Pepe to find coins and tabasco
                    salsa to fight against the crazy hen.
                </p>

                <div class="techset_wrapper">
                    <div class="techset">
                        <img src="../../../../assets/images/javascript.svg" alt="Tech">
                        <p>JavaScript</p>
                    </div>

                    <div class="techset">
                        <img src="../../../../assets/images/css.svg" alt="Tech">
                        <p>CSS</p>
                    </div>

                    <div class="techset">
                        <img src="../../../../assets/images/html.svg" alt="Tech">
                        <p>HTML</p>
                    </div>
                </div>

                <div class="modal_btn_wrapper">
                    <button class="modal_btn">GitHub <img class="modal_btn_arrow"
                            src="../../../../assets/images/arrow_outward.svg"></button>
                    <button class="modal_btn">Live Test <img class="modal_btn_arrow"
                            src="../../../../assets/images/arrow_outward.svg"></button>
                </div>

            </div>

            <div class="right">
                <img class="img_modal" src="../../../../assets/images/el_pollo_loco.jpg" alt="Project Preview Image">

                <div class="link-wrapper">
                    <a href="#">
                        Next project
                        <img src="../../../../assets/images/arrow_forward.svg" alt="">

    <footer>
